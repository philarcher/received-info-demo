<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Audience Stats</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: sans-serif; background: #fafafa; }
    .header { text-align: center; padding: 20px; }
    .reset-btn { background: #BA0C2F; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-bottom: 20px; }
    .reset-btn:hover { background: #8a0923; }
  </style>
</head>
<body>

  <div id="app">
    <div class="header">
      <img src="qr.svg" alt="Scan Me" width="200"> 
      <br>
      <button class="reset-btn" @click="resetData">Reset Demo Data</button>
      <h2>Total Scans: {{ totalScans }}</h2>
    </div>

    <div style="display: flex; justify-content: space-around; align-items: center; width: 100%; max-width: 1000px; margin: 0 auto; padding: 20px;">
      <div style="width: 45%; text-align: center;">
        <h2>Operating Systems</h2>
        <canvas id="osChart"></canvas>
      </div>
      <div style="width: 45%; text-align: center;">
        <h2>Languages</h2>
        <canvas id="langChart"></canvas>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // PASTE YOUR FIREBASE CONFIG HERE TOO
    const firebaseConfig = {
  apiKey: "AIzaSyCgxDQ5guB9GS9hWL72iikxNny0T_hdttw",
  authDomain: "http-header-demo.firebaseapp.com",
  databaseURL: "https://http-header-demo-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "http-header-demo",
  storageBucket: "http-header-demo.firebasestorage.app",
  messagingSenderId: "641955002269",
  appId: "1:641955002269:web:a6636e542ed35ab815e174",
  measurementId: "G-TQ4220GM4D"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

   // Import markRaw alongside createApp
    const { createApp, markRaw } = Vue;

    createApp({
      data() {
        return {
          totalScans: 0,
          // Notice we removed osChart and langChart from here!
          langColors: {} 
        }
      },
      mounted() {
        // Initialize them as standard class properties, not reactive Vue data
        this.osChart = null;
        this.langChart = null;

        this.initializeCharts();
        this.listenToFirebase();
      },
      methods: {
        initializeCharts() {
          const osCtx = document.getElementById('osChart').getContext('2d');
          // Wrap the new Chart in markRaw()
          this.osChart = markRaw(new Chart(osCtx, {
            type: 'pie',
            data: { 
              labels: ['iOS', 'Android', 'Other'], 
              datasets: [{ 
                data: [0, 0, 0], 
                backgroundColor: ['#000000', '#3DDC84', '#888888'] 
              }] 
            },
            options: { responsive: true, animation: { duration: 500 } }
          }));

          const langCtx = document.getElementById('langChart').getContext('2d');
          // Wrap the new Chart in markRaw()
          this.langChart = markRaw(new Chart(langCtx, {
            type: 'pie',
            data: { 
              labels: [], 
              datasets: [{ 
                data: [], 
                backgroundColor: [] 
              }] 
            },
            options: { responsive: true, animation: { duration: 500 } }
          }));
        },

        generateColor(languageName) {
          if (this.langColors[languageName]) {
            return this.langColors[languageName]; 
          }
          const hue = Math.floor(Math.random() * 360);
          const newColor = `hsl(${hue}, 70%, 55%)`;
          this.langColors[languageName] = newColor;
          return newColor;
        },

        listenToFirebase() {
          const scansRef = ref(db, 'scans');
          onValue(scansRef, (snapshot) => {
            const data = snapshot.val();
            this.processData(data);
          });
        },

        processData(data) {
          let osCounts = { 'iOS': 0, 'Android': 0, 'Other': 0 };
          let langCounts = {};
          this.totalScans = 0;

          if (data) {
            const scans = Object.values(data);
            this.totalScans = scans.length;
            
            const languageNamesAPI = new Intl.DisplayNames(['en'], { type: 'language' });

            scans.forEach(scan => {
              // OS Logic
              if (osCounts[scan.os] !== undefined) { osCounts[scan.os]++; } 
              else { osCounts['Other']++; }

              // Dynamic Language Logic
              let baseLang = scan.language.split('-')[0].toLowerCase();
              let displayLang;
              try {
                displayLang = languageNamesAPI.of(baseLang); 
              } catch (error) {
                displayLang = baseLang.toUpperCase(); 
              }
              
              langCounts[displayLang] = (langCounts[displayLang] || 0) + 1;
            });
          }

          // Update OS Chart
          this.osChart.data.datasets[0].data = [osCounts['iOS'], osCounts['Android'], osCounts['Other']];
          this.osChart.update();

          // Update Language Chart
          const labels = Object.keys(langCounts);
          const dataPoints = Object.values(langCounts);
          const backgroundColors = labels.map(label => this.generateColor(label));

          this.langChart.data.labels = labels;
          this.langChart.data.datasets[0].data = dataPoints;
          this.langChart.data.datasets[0].backgroundColor = backgroundColors;
          
          this.langChart.update();
        },

        resetData() {
          if(confirm("Are you sure you want to clear all demo data?")) {
            set(ref(db, 'scans'), null);
            this.langColors = {}; 
          }
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
