<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Check-in</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; margin: 0; text-align: center; }
    .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <div class="card">
    <h1 id="message">Registering your device...</h1>
    <p>Please look at the presentation screen.</p>
  </div>

  <script type="module">
    // 1. Import Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // 2. PASTE YOUR FIREBASE CONFIG HERE
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 3. Detect Device Info
    function getOS() {
      const userAgent = window.navigator.userAgent || window.navigator.vendor || window.opera;
      if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) return "iOS";
      if (/android/i.test(userAgent)) return "Android";
      return "Other";
    }

    const deviceData = {
      os: getOS(),
      language: navigator.language || navigator.userLanguage || "en"
    };

    // 4. Send to Firebase
    try {
      const scansRef = ref(db, 'scans');
      push(scansRef, deviceData).then(() => {
        document.getElementById('message').innerText = "Success! You're on the board.";
        document.getElementById('message').style.color = "#3DDC84";
      });
    } catch (e) {
      document.getElementById('message').innerText = "Oops, something went wrong.";
    }
  </script>
</body>
</html>
